name: Publish npm package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run typecheck
          npm test

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PACKAGE_VERSION}; expected ${EXPECTED_TAG}."
            exit 1
          fi

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Pack package
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_FILE=$(npm pack --silent)
          echo "package_file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish "${{ steps.pack.outputs.package_file }}" --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: ${{ steps.pack.outputs.package_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
